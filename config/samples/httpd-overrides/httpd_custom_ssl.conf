# Custom SSL/TLS settings for Barbican HTTPD
# This file is mounted via ExtraMounts to /etc/httpd/conf_custom/
#
# Allow TLS 1.2 and 1.3. TLS 1.3 is required for post-quantum hybrid
# key exchange (e.g. X25519MLKEM768) when the underlying OpenSSL is
# PQC-capable.  TLS 1.2 is retained for compatibility with clients or
# intermediaries that do not yet support 1.3.
#
# NOTE — For environments with strict PQC requirements, replace the
# line below with:
#   SSLProtocol -all +TLSv1.3
# This ensures every connection can negotiate hybrid PQC key exchange.
SSLProtocol -all +TLSv1.2 +TLSv1.3

# TLS 1.2 cipher suites — strong AEAD ciphers with ECDHE key exchange.
# These are classical (non-PQC) but represent current best practice.
SSLCipherSuite ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305

# TLS 1.3 cipher suites — 256-bit symmetric, quantum-resistant at the
# symmetric level.  Key exchange algorithm selection (classical vs
# hybrid PQC) is controlled by OpenSSL configuration, not here.
SSLCipherSuite TLSv1.3 TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256
